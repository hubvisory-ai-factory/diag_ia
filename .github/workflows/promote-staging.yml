# Release PR: staging → main (one persistent PR, updated on each staging push).
# Maintainer gets a review request ONLY when this PR is first created.

name: Release staging to prod

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-staging-to-main
  cancel-in-progress: false

jobs:
  open-release-pr:
    name: open-release-pr
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release PR exists (staging → main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            ## Promotion staging → prod

            Cette PR regroupe tout ce qui est sur `staging` et pas encore en prod.

            - **Staging** : https://staging.diag-ia.hubvisory.app/
            - **Prod (apres merge)** : https://diag-ia.hubvisory.app/

            ### Que faire
            1. Verifie les changements sur staging (URLs client si besoin).
            2. **Merge** cette PR — deploiement prod automatique (~1 min).

            Les soumissions consultants (PR vers staging) ne creent pas une nouvelle PR vers main — seulement cette PR de release est mise a jour.
        run: |
          set -euo pipefail

          AHEAD=$(gh api "repos/${GITHUB_REPOSITORY}/compare/main...staging" --jq '.ahead_by')
          if [ "$AHEAD" = "0" ]; then
            echo "staging is even with main — no release PR needed."
            exit 0
          fi

          EXISTING=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --base main --head staging --state open --json number -q 'length')

          if [ "$EXISTING" != "0" ]; then
            echo "Release PR already open — it will include new staging commits automatically."
            exit 0
          fi

          gh pr create --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head staging \
            --title "Release: promote staging to prod" \
            --body "$PR_BODY" \
            --reviewer gaspardhassenforder

          echo "Release PR created — review requested."
