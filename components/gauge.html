<!--
  COMPONENT: SVG Gauge
  SECTION: Dashboard > Score & Shadow IA (maturity score)
  DATA NEEDED:
    - CLIENT_DATA.globalMetrics.maturiteGlobale — numeric score (e.g. 2.5)
    - THEME.heat — array of 5 color strings for band coloring
    - THEME.primary, THEME.accent, THEME.ink, THEME.muted, THEME.border
  CUSTOMIZATION:
    - Change max value (default 5) for different scales
    - Edit the bands array to adjust color breakpoints
    - Modify W/H/R constants for different gauge sizes
    - Customize legend labels in buildGaugeLegend()
  DEPENDENCIES: None (pure SVG generated by JS)
-->

<!-- Gauge container -->
<div class="rounded-2xl border p-6" style="background: var(--surface); border-color: var(--border);">
  <div class="flex items-center gap-2 mb-4">
    <!-- icon('gauge', 16, 'var(--primary)') -->
    <h3 class="font-semibold text-sm" style="color: var(--ink);">Maturite IA globale</h3>
  </div>
  <div class="flex justify-center" id="gauge-container">
    <!-- SVG gauge injected by renderGauge() -->
  </div>
  <div class="flex flex-wrap justify-center gap-3 mt-3" id="gauge-legend">
    <!-- Legend injected by buildGaugeLegend() -->
  </div>
</div>

<script>
// ---- SVG GAUGE RENDERER ----
// Draws a half-circle gauge with colored bands, a needle, and a value display.
//
// Parameters:
//   containerId — DOM id of the target div
//   value       — current score (number)
//   max         — maximum score (number, typically 5)
//   levels      — (unused, kept for API compat)
//   theme       — theme object with .heat[], .primary, .accent, .ink, .muted, .border

function renderGauge(containerId, value, max, levels, theme) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const W = 320, H = 190;
  const cx = 160, cy = 170, R = 110;
  const startAngle = Math.PI;
  const endAngle = 2 * Math.PI;
  const totalArc = endAngle - startAngle;

  function polarToXY(angle, r) {
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  }

  function arcPath(r, a1, a2) {
    const s = polarToXY(a1, r);
    const e = polarToXY(a2, r);
    const large = (a2 - a1) > Math.PI ? 1 : 0;
    return `M${s.x},${s.y} A${r},${r} 0 ${large},1 ${e.x},${e.y}`;
  }

  // Background color bands — maps score ranges to heat colors
  const bands = [
    { from: 0, to: 1.5, color: theme.heat[0] },   // Red
    { from: 1.5, to: 3, color: theme.heat[2] },    // Amber
    { from: 3, to: 4, color: theme.heat[3] },      // Light green
    { from: 4, to: 5, color: theme.heat[4] }       // Green
  ];

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;

  // Draw background bands (faded)
  bands.forEach(b => {
    const a1 = startAngle + (b.from / max) * totalArc;
    const a2 = startAngle + (b.to / max) * totalArc;
    svg += `<path d="${arcPath(R, a1, a2)}" stroke="${b.color}" stroke-width="18" fill="none" opacity="0.18" stroke-linecap="butt"/>`;
  });

  // Active arc (primary color, from 0 to current value)
  const valueAngle = startAngle + (value / max) * totalArc;
  svg += `<path d="${arcPath(R, startAngle, valueAngle)}" stroke="${theme.primary}" stroke-width="18" fill="none" stroke-linecap="round"/>`;

  // Tick marks and labels (0 through max)
  for (let i = 0; i <= max; i++) {
    const angle = startAngle + (i / max) * totalArc;
    const inner = polarToXY(angle, R + 4);
    const outer = polarToXY(angle, R + 14);
    const label = polarToXY(angle, R + 26);
    svg += `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}" stroke="${theme.border}" stroke-width="1.5"/>`;
    svg += `<text x="${label.x}" y="${label.y}" text-anchor="middle" dominant-baseline="middle" fill="${theme.muted}" font-size="11" font-family="Inter, sans-serif">${i}</text>`;
  }

  // Needle (triangle pointing to current value)
  const needleAngle = startAngle + (value / max) * totalArc;
  const needleTip = polarToXY(needleAngle, R - 16);
  const needleBase1 = polarToXY(needleAngle + Math.PI / 2, 4);
  const needleBase2 = polarToXY(needleAngle - Math.PI / 2, 4);
  svg += `<polygon points="${needleTip.x},${needleTip.y} ${needleBase1.x},${needleBase1.y} ${needleBase2.x},${needleBase2.y}" fill="${theme.accent}"/>`;

  // Center dot
  svg += `<circle cx="${cx}" cy="${cy}" r="8" fill="${theme.ink}"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="4" fill="${theme.accent}"/>`;

  // Value text
  svg += `<text x="${cx}" y="${cy - 30}" text-anchor="middle" fill="${theme.ink}" font-size="36" font-weight="700" font-family="Inter, sans-serif">${value.toFixed(1)}</text>`;
  svg += `<text x="${cx}" y="${cy - 14}" text-anchor="middle" fill="${theme.muted}" font-size="12" font-family="Inter, sans-serif">/ ${max}</text>`;

  svg += '</svg>';
  container.innerHTML = svg;
}

// ---- GAUGE LEGEND ----
function buildGaugeLegend(theme) {
  const legend = document.getElementById('gauge-legend');
  if (!legend) return;

  const levels = [
    { label: 'Debutant', color: theme.heat[0] },
    { label: 'Emergent', color: theme.heat[2] },
    { label: 'Operationnel', color: theme.heat[3] },
    { label: 'Avance', color: theme.heat[4] }
  ];

  legend.innerHTML = levels.map(l => `
    <div class="flex items-center gap-1">
      <span class="w-2.5 h-2.5 rounded-full" style="background: ${l.color};"></span>
      <span class="text-xs" style="color: var(--muted);">${l.label}</span>
    </div>
  `).join('');
}

// ---- USAGE ----
// renderGauge('gauge-container', CLIENT_DATA.globalMetrics.maturiteGlobale, 5, [], THEME);
// buildGaugeLegend(THEME);
</script>
