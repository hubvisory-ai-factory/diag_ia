<!--
  COMPONENT: Heatmap Table
  SECTION: Dashboard > Radar + Heatmap row (right column)
  DATA NEEDED:
    - CLIENT_DATA.heatmapMatrix — array of { idMetier, metier, usage, confiance }
    - CLIENT_DATA.ui.blocks.heatmapTitle — card title
    - CLIENT_DATA.ui.blocks.heatmapSubtitle — card subtitle
    - THEME.heat — array of 5 colors for the 1-5 scale
  CUSTOMIZATION:
    - Add more columns by extending the <th> headers and the row template
    - Change the color mapping in heatColor() for a different palette
    - Remove the click-to-navigate behavior if not using metier views
  DEPENDENCIES: THEME.heat[] color array, navigateTo() function for row clicks
-->

<!-- Heatmap Card -->
<div class="rounded-2xl border p-6" style="background: var(--surface); border-color: var(--border);">
  <div class="flex items-center justify-between mb-1">
    <h3 class="font-semibold text-sm" style="color: var(--ink);">Cartographie par metier</h3>
  </div>
  <p class="text-xs mb-4" style="color: var(--muted);">Maturite croisee</p>
  <div class="overflow-x-auto">
    <table class="w-full" id="heatmap-table">
      <thead>
        <tr>
          <th class="text-left text-xs font-medium py-2 px-3" style="color: var(--muted);">Metier</th>
          <th class="text-center text-xs font-medium py-2 px-3" style="color: var(--muted);">Usage</th>
          <th class="text-center text-xs font-medium py-2 px-3" style="color: var(--muted);">Confiance</th>
        </tr>
      </thead>
      <tbody id="heatmap-body">
        <!-- Injected by initHeatmap() -->
      </tbody>
    </table>
  </div>
  <!-- Color scale legend -->
  <div class="flex items-center justify-center gap-1.5 mt-4">
    <span class="text-xs" style="color: var(--muted);">1</span>
    <div class="flex gap-0.5" id="heat-legend">
      <!-- 5 color swatches injected by JS -->
    </div>
    <span class="text-xs" style="color: var(--muted);">5</span>
  </div>
</div>

<script>
// ---- HEATMAP INIT ----
function initHeatmap(theme) {
  const tbody = document.getElementById('heatmap-body');
  if (!tbody) return;

  // Maps a 1-5 value to the corresponding heat color
  function heatColor(val) {
    const idx = Math.max(0, Math.min(4, Math.round(val) - 1));
    return theme.heat[idx];
  }

  let html = '';
  CLIENT_DATA.heatmapMatrix.forEach(row => {
    html += `<tr class="cursor-pointer hover:bg-gray-50" data-metier-nav="${row.idMetier}">
      <td class="py-2.5 px-3 text-sm font-medium" style="color: var(--ink);">${row.metier}</td>
      <td class="py-2.5 px-3 text-center">
        <span class="heat-cell inline-flex items-center justify-center w-10 h-10 rounded-lg text-white text-sm font-bold"
              style="background: ${heatColor(row.usage)}">${row.usage}</span>
      </td>
      <td class="py-2.5 px-3 text-center">
        <span class="heat-cell inline-flex items-center justify-center w-10 h-10 rounded-lg text-white text-sm font-bold"
              style="background: ${heatColor(row.confiance)}">${row.confiance}</span>
      </td>
    </tr>`;
  });
  tbody.innerHTML = html;

  // Color legend
  const legendEl = document.getElementById('heat-legend');
  if (legendEl) {
    legendEl.innerHTML = theme.heat.map(c =>
      `<span class="w-5 h-3 rounded" style="background: ${c};"></span>`
    ).join('');
  }

  // Row click navigates to metier view
  tbody.querySelectorAll('[data-metier-nav]').forEach(tr => {
    tr.addEventListener('click', () => {
      navigateTo('view-metier-' + tr.dataset.metierNav);
    });
  });
}

// ---- CSS for heat-cell hover ----
// .heat-cell { transition: transform 0.15s; border-radius: 6px; }
// .heat-cell:hover { transform: scale(1.08); }

// ---- USAGE ----
// initHeatmap(THEME);
</script>
