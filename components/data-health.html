<!--
  COMPONENT: Data Health Panel (sources table + quality ring + improvement axes)
  SECTION: Charte view > Sante des donnees
  DATA NEEDED:
    - CLIENT_DATA.dataGovernance.sources — array of { nom, type, qualite (1-5), description }
    - CLIENT_DATA.dataGovernance.scoreExploitation — overall score (number, 0-5)
    - CLIENT_DATA.dataGovernance.axesAmelioration — array of { titre, description, priorite }
    - THEME.heat[] — color array for quality bar colors
    - THEME.ink, THEME.muted, THEME.border
  CUSTOMIZATION:
    - Add more source fields (e.g. owner, last updated) to the row template
    - Change the ring radius by editing the SVG viewBox and r attribute
    - Adjust quality thresholds for bar colors in the barColor logic
  DEPENDENCIES: hexToSoft() utility, THEME object
-->

<!-- DATA HEALTH PANEL -->
<section class="mb-8">
  <h2 class="font-display text-2xl mb-5" style="color: var(--ink);">Sante des donnees</h2>
  <div class="rounded-2xl border p-6" style="background: var(--surface); border-color: var(--border);">
    <div class="grid grid-cols-12 gap-6">

      <!-- Left: Data sources table -->
      <div class="col-span-12 lg:col-span-7">
        <h4 class="font-semibold text-sm mb-4" style="color: var(--ink);">Sources de donnees</h4>
        <div class="space-y-3" id="data-sources-list">
          <!-- JS generates one row per source -->
        </div>
      </div>

      <!-- Right: Quality ring SVG -->
      <div class="col-span-12 lg:col-span-5 flex flex-col items-center justify-center">
        <div class="relative" id="quality-ring-container">
          <!-- SVG ring injected by JS -->
        </div>
        <p class="text-xs mt-2" style="color: var(--muted);">Score d'exploitation des donnees</p>
      </div>

    </div>

    <!-- Bottom: Improvement axes -->
    <div class="mt-6 pt-5 border-t" style="border-color: var(--border);">
      <h4 class="font-semibold text-sm mb-3" style="color: var(--ink);">Axes d'amelioration</h4>
      <div class="space-y-2" id="improvement-axes">
        <!-- JS generates improvement items -->
      </div>
    </div>
  </div>
</section>

<script>
// ---- DATA HEALTH BUILDER ----
function buildDataHealth(theme) {

  // --- Sources list ---
  const sourcesEl = document.getElementById('data-sources-list');
  if (sourcesEl) {
    sourcesEl.innerHTML = CLIENT_DATA.dataGovernance.sources.map(s => {
      const pct = (s.qualite / 5) * 100;
      const barColor = s.qualite >= 4 ? theme.heat[4]
                     : s.qualite >= 3 ? theme.heat[3]
                     : s.qualite >= 2 ? theme.heat[2]
                     : theme.heat[0];
      return `
        <div class="flex items-center gap-4 p-3 rounded-lg" style="background: var(--bg);">
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
              <h5 class="text-sm font-medium" style="color: var(--ink);">${s.nom}</h5>
              <span class="text-xs px-2 py-0.5 rounded-full"
                    style="background: var(--bg-alt); color: var(--muted);">${s.type}</span>
            </div>
            <p class="text-xs mb-2" style="color: var(--muted);">${s.description}</p>
            <div class="h-1.5 rounded-full" style="background: var(--border);">
              <div class="h-full rounded-full transition-all"
                   style="width: ${pct}%; background: ${barColor};"></div>
            </div>
          </div>
          <span class="text-lg font-bold" style="color: ${barColor};">${s.qualite}/5</span>
        </div>`;
    }).join('');
  }

  // --- Quality ring SVG ---
  const ringContainer = document.getElementById('quality-ring-container');
  if (ringContainer) {
    const score = CLIENT_DATA.dataGovernance.scoreExploitation;
    const pct = (score / 5) * 100;
    const circumference = 2 * Math.PI * 50;
    const offset = circumference - (pct / 100) * circumference;
    const ringColor = score >= 4 ? theme.heat[4]
                    : score >= 3 ? theme.heat[3]
                    : score >= 2 ? theme.heat[2]
                    : theme.heat[0];

    ringContainer.innerHTML = `
      <svg width="140" height="140" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="${theme.border}" stroke-width="8"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="${ringColor}" stroke-width="8"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
          stroke-linecap="round" transform="rotate(-90 60 60)"/>
        <text x="60" y="55" text-anchor="middle" fill="${theme.ink}"
              font-size="24" font-weight="700" font-family="Inter, sans-serif">${score}</text>
        <text x="60" y="72" text-anchor="middle" fill="${theme.muted}"
              font-size="12" font-family="Inter, sans-serif">/ 5</text>
      </svg>`;
  }

  // --- Improvement axes ---
  const axesEl = document.getElementById('improvement-axes');
  if (axesEl) {
    axesEl.innerHTML = CLIENT_DATA.dataGovernance.axesAmelioration.map(a => {
      const prioColor = a.priorite === 'Haute' ? theme.accent : '#d97706';
      return `
        <div class="flex items-center justify-between p-3 rounded-lg" style="background: var(--bg);">
          <div>
            <h5 class="text-sm font-medium" style="color: var(--ink);">${a.titre}</h5>
            <p class="text-xs" style="color: var(--muted);">${a.description}</p>
          </div>
          <span class="text-xs px-2 py-0.5 rounded-full whitespace-nowrap"
                style="background: ${hexToSoft(prioColor, 0.12)}; color: ${prioColor};">
            ${a.priorite}
          </span>
        </div>`;
    }).join('');
  }
}

// ---- USAGE ----
// buildDataHealth(THEME);
</script>
