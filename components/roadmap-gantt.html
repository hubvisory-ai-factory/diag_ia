<!--
  COMPONENT: Roadmap Gantt (packages P1/P2/P3, semaines)
  SECTION: Dashboard global — Roadmap de déploiement (sous le Catalogue des solutions)
  INTRODUCED BY: client "clovis"

  WHEN TO USE
    When the delivery is sequenced into priority packages (P1/P2/P3) and each
    package has a week-by-week deployment plan per product/workstream. This is a
    lightweight, dependency-free CSS Gantt: one row per product, phases drawn as
    absolutely-positioned coloured bars over a week grid, with a Go/no-Go marker
    at the Construction↔Déploiement boundary. Toggles switch between packages
    (default P1). Clicking a row opens a modal listing the catalogue solutions
    that belong to that product AND that package (joined to catalogue-votac.html).

  WHY CSS (and not Chart.js / Mermaid / a Gantt lib)
    - No build step, CDN-only, print/PDF-friendly, fully brand-themed via CSS vars.
    - Chart.js has no native Gantt; faking it with floating bars loses the
      multi-phase rows, half-week segments and clickable rows.
    - Mermaid gantt renders once: not interactive, not themeable to the brand,
      poor for PDF export.
    - Full Gantt libs (Frappe, dhtmlx) add heavy deps for drag/drop/dependencies
      this report does not need. The hand-rolled CSS approach is the best fit.

  DATA NEEDED
    - CLIENT_DATA.produits[] — { id, nom, color }  (rows are matched by produitId)
    - CLIENT_DATA.catalogueSolutions[] — { id, fonctionnalite, produitId, package,
        objectif, votac } (used by the row modal; see catalogue-votac.html)
    - CLIENT_DATA.roadmapPackages:
        {
          weekPrefix: "S",                       // column label prefix (S1, S2…)
          phaseStyles: {                         // key → { label, color }
            cadrage:       { label: "Cadrage", color: "#dbeafe" },
            construction:  { label: "Construction", color: "#fef9c3" },
            deploiement:   { label: "Déploiement", color: "#dcfce7" },
            acculturation: { label: "Acculturation", color: "#ffedd5" },
            stabilisation: { label: "Stabilisation & Généralisation", color: "#c7d2e4" }
          },
          packages: [
            {
              code: "P1",
              title: "Package 1 — …",            // shown above the chart
              subtitle: "…",
              maxWeek: 14,                        // number of week columns (S1..S14)
              lines: [
                {
                  produitId: "produit_a",
                  gono: 8,                        // optional Go/no-Go boundary (see units)
                  segments: [
                    { phase: "cadrage",       start: 1,   end: 5 },
                    { phase: "construction",  start: 5,   end: 8 },
                    { phase: "deploiement",   start: 8,   end: 9.5 },
                    { phase: "acculturation", start: 9.5, end: 10.5 },
                    { phase: "stabilisation", start: 10.5, end: 11.5 }
                  ]
                }
              ]
            }
          ]
        }

  UNITS (important)
    start/end are 1-based week BOUNDARIES, not week numbers:
      · start = 1     → left edge of S1
      · end   = k + 1 → right edge of week k
      · column Sk therefore spans [k, k+1]; a one-week phase on S5 is start:5,end:6
    Halves are allowed (end: 9.5 = middle of S9) to render the thin
    Déploiement/Acculturation slivers seen on source decks.
    gono is in the same units; place it at construction.end (= deploiement.start).
    Phases should chain (each start = previous end). A deliberate gap between
    Cadrage end and Construction start is fine (a workstream that starts later).

  AUTHORING FROM A SOURCE SVG/DECK
    If you have the original timeline as an SVG (e.g. exported from a slide),
    extract each coloured rect's x-extent, derive the column width from the
    Cadrage block, correct for inter-block padding, then snap start/end to the
    nearest 0.5 week. maxWeek = ceil(max end) - 1.

  DEPENDENCIES: Tailwind CSS, icon(), hexToSoft(), packageColor(),
                a generic openModal(html), votacTotal() (for the row modal)
-->

<!-- ─── CSS (add once to the page <style>) ─── -->
<style>
  .roadmap-gantt-wrap { min-width: 0; width: 100%; }
  .roadmap-gantt-header,
  .roadmap-gantt-row {
    display: grid;
    grid-template-columns: 11rem repeat(var(--roadmap-weeks, 14), minmax(2rem, 1fr));
    align-items: stretch;
  }
  .roadmap-gantt-row { cursor: pointer; }
  .roadmap-gantt-row:hover .roadmap-line-label { color: var(--primary); }
  .roadmap-week-cell {
    text-align: center; font-size: 10px; font-weight: 600;
    color: var(--muted-soft); padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
  }
  .roadmap-week-cell:not(:first-child)::before {
    content: 'Sem. '; font-weight: 500; font-size: 9px; opacity: 0.65;
  }
  .roadmap-line-label {
    font-size: 11px; font-weight: 600; color: var(--ink);
    padding: 0.65rem 0.75rem 0.65rem 0; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.5rem; transition: color 0.15s;
  }
  .roadmap-track {
    position: relative; min-height: 2.75rem; border-bottom: 1px solid var(--border);
    background: repeating-linear-gradient(
      to right, transparent,
      transparent calc(100% / var(--roadmap-weeks, 14) - 1px),
      var(--border) calc(100% / var(--roadmap-weeks, 14) - 1px),
      var(--border) calc(100% / var(--roadmap-weeks, 14)));
  }
  .roadmap-segment { position: absolute; top: 0.5rem; bottom: 0.5rem; border-radius: 4px; }
  .roadmap-gono {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 0.625rem; height: 0.625rem; border-radius: 9999px;
    background: var(--surface); border: 1.5px solid var(--primary); z-index: 2;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.9);
  }
  .roadmap-gono-legend {
    width: 0.625rem; height: 0.625rem; border-radius: 9999px;
    background: var(--surface); border: 1.5px solid var(--primary); flex-shrink: 0;
  }
</style>

<!-- ─── MARKUP ─── -->
<section class="mb-8">
  <div class="rounded-2xl border p-6" style="background: var(--surface); border-color: var(--border);">
    <div class="flex items-center gap-2 mb-1">
      <!-- icon('map', 16, 'var(--primary)') -->
      <p class="text-[11px] font-semibold uppercase tracking-[0.18em]" style="color: var(--accent);">Roadmap</p>
    </div>
    <h3 class="font-display text-xl" style="color: var(--ink);" id="roadmap-title">Roadmap de déploiement</h3>

    <div class="flex flex-wrap gap-2 mt-4 mb-4" id="roadmap-package-toggles"></div>
    <div id="roadmap-package-header" class="mb-3"></div>
    <div class="overflow-x-auto rounded-xl border" style="border-color: var(--border);">
      <div id="roadmap-gantt" class="roadmap-gantt-wrap p-3" style="background: var(--bg);"></div>
    </div>
    <div id="roadmap-legend" class="flex flex-wrap items-center gap-x-4 gap-y-2 mt-4 pt-4 border-t" style="border-color: var(--border);"></div>
  </div>
</section>

<!-- ─── BUILDER ─── -->
<script>
function buildRoadmapGantt(theme) {
  const pkgData = CLIENT_DATA.roadmapPackages;
  const ganttEl = document.getElementById('roadmap-gantt');
  const togglesEl = document.getElementById('roadmap-package-toggles');
  const headerEl = document.getElementById('roadmap-package-header');
  const legendEl = document.getElementById('roadmap-legend');
  if (!pkgData || !ganttEl || !togglesEl) return;

  const weekPrefix = pkgData.weekPrefix || 'S';
  const phaseStyles = pkgData.phaseStyles || {};
  const packages = pkgData.packages || [];
  const produitMap = {};
  (CLIENT_DATA.produits || []).forEach(p => { produitMap[p.id] = p; });
  let activeCode = (packages.find(p => p.code === 'P1') || packages[0] || {}).code;

  // start/end are 1-based week boundaries (1 = left of S1, k+1 = right of Sk)
  const weeksOf = pkg => pkg.maxWeek || Math.ceil(Math.max(1, ...(pkg.lines || [])
    .flatMap(l => (l.segments || []).map(s => (s.end || 1) - 1))));
  const pos = (start, end, w) => ({
    left: `${((start - 1) / w) * 100}%`,
    width: `${Math.max(((end - start) / w) * 100, 0.6)}%`
  });

  function renderGantt(pkg) {
    if (!pkg) return;
    const w = weeksOf(pkg);
    ganttEl.style.setProperty('--roadmap-weeks', w);
    const weeks = Array.from({ length: w }, (_, i) => `<div class="roadmap-week-cell">${weekPrefix}${i + 1}</div>`).join('');
    const rows = (pkg.lines || []).map(line => {
      const prod = produitMap[line.produitId];
      const color = (prod && prod.color) || theme.primary;
      const segs = (line.segments || []).filter(s => s.phase !== 'gono').map(s => {
        const st = phaseStyles[s.phase] || { label: s.phase, color: theme.bgAlt };
        const p = pos(s.start, s.end, w);
        return `<span class="roadmap-segment" style="left:${p.left};width:${p.width};background:${st.color};" title="${st.label}"></span>`;
      }).join('');
      const gono = line.gono != null
        ? `<span class="roadmap-gono" style="left:${((line.gono - 1) / w) * 100}%;" title="Décision Go / no Go"></span>` : '';
      return `<div class="roadmap-gantt-row roadmap-line" data-produit-id="${line.produitId}" data-package-code="${pkg.code}">
          <div class="roadmap-line-label"><span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${color};"></span><span>${prod ? prod.nom : line.produitId}</span></div>
          <div class="roadmap-track" style="grid-column:2 / -1;">${segs}${gono}</div>
        </div>`;
    }).join('');
    ganttEl.innerHTML = `<div class="roadmap-gantt-header"><div class="roadmap-week-cell text-left" style="color:var(--muted);font-size:10px;">Produit</div>${weeks}</div>${rows}`;
    ganttEl.querySelectorAll('.roadmap-line').forEach(row =>
      row.addEventListener('click', () => openRoadmapLineModal(row.dataset.produitId, row.dataset.packageCode, theme)));
  }

  function renderHeader(pkg) {
    if (!headerEl || !pkg) return;
    headerEl.innerHTML = `<h4 class="font-display text-lg" style="color:var(--ink);">${pkg.title || pkg.code}</h4>${pkg.subtitle ? `<p class="text-sm mt-0.5" style="color:var(--muted);">${pkg.subtitle}</p>` : ''}`;
  }

  function renderLegend() {
    if (!legendEl) return;
    legendEl.innerHTML = Object.values(phaseStyles).map(st =>
      `<span class="inline-flex items-center gap-1.5 text-[11px]" style="color:var(--muted);"><span class="w-3 h-3 rounded-sm flex-shrink-0" style="background:${st.color};"></span>${st.label}</span>`
    ).join('') + `<span class="inline-flex items-center gap-1.5 text-[11px]" style="color:var(--muted);"><span class="roadmap-gono-legend"></span>Décision Go / no Go</span>`;
  }

  function renderToggles() {
    togglesEl.innerHTML = packages.map(pkg => {
      const active = pkg.code === activeCode;
      const c = packageColor(pkg.code, theme);
      const style = active ? `background:${c};color:#fff;border-color:${c};` : `background:var(--surface);color:${c};border-color:${hexToSoft(c, 0.35)};`;
      return `<button type="button" class="roadmap-pkg-toggle px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-colors" data-code="${pkg.code}" style="${style}">${pkg.code}</button>`;
    }).join('');
    togglesEl.querySelectorAll('.roadmap-pkg-toggle').forEach(btn =>
      btn.addEventListener('click', () => {
        activeCode = btn.dataset.code;
        renderToggles();
        const pkg = packages.find(p => p.code === activeCode);
        renderHeader(pkg); renderGantt(pkg);
      }));
  }

  renderToggles();
  renderLegend();
  const initial = packages.find(p => p.code === activeCode) || packages[0];
  renderHeader(initial);
  renderGantt(initial);
}

// Row click → list catalogue solutions for this product + package, then open
// the catalogue solution modal (see catalogue-votac.html → openCatalogueModal).
function openRoadmapLineModal(produitId, packageCode, theme) {
  const produitMap = {};
  (CLIENT_DATA.produits || []).forEach(p => { produitMap[p.id] = p; });
  const prod = produitMap[produitId];
  const c = (prod && prod.color) || theme.primary;
  const sols = (CLIENT_DATA.catalogueSolutions || [])
    .filter(s => s.produitId === produitId && s.package === packageCode)
    .sort((a, b) => (votacTotal(b.votac) || 0) - (votacTotal(a.votac) || 0));
  const pkgMeta = ((CLIENT_DATA.roadmapPackages || {}).packages || []).find(p => p.code === packageCode);

  const list = sols.length
    ? sols.map(s => {
        const vt = votacTotal(s.votac);
        return `<button type="button" class="roadmap-sol-chip w-full text-left rounded-xl border p-4 card-hover transition-colors" data-sol-id="${s.id}" style="border-color:var(--border);background:var(--surface);">
          <div class="flex items-start justify-between gap-2 mb-1"><span class="text-xs font-mono" style="color:var(--muted-soft);">${s.id}</span>${vt != null ? `<span class="text-xs font-semibold" style="color:${c};">${vt} pts</span>` : ''}</div>
          <h4 class="text-sm font-semibold" style="color:var(--ink);">${s.fonctionnalite || ''}</h4>
          ${s.objectif ? `<p class="text-xs mt-1.5 leading-relaxed clamp-2" style="color:var(--muted);">${s.objectif}</p>` : ''}
        </button>`;
      }).join('')
    : `<p class="text-sm rounded-xl border border-dashed p-4" style="color:var(--muted);border-color:var(--border);">Aucune solution ${packageCode} pour ce produit dans le catalogue.</p>`;

  openModal(`
    <h3 class="font-display text-2xl mb-1" style="color:var(--ink);">${prod ? prod.nom : produitId}</h3>
    <p class="text-sm mb-5" style="color:var(--muted);">${pkgMeta ? pkgMeta.title : packageCode} — ${sols.length} solution${sols.length !== 1 ? 's' : ''}</p>
    <div class="space-y-3">${list}</div>`);

  document.querySelectorAll('.roadmap-sol-chip').forEach(btn =>
    btn.addEventListener('click', () => {
      const sol = (CLIENT_DATA.catalogueSolutions || []).find(s => s.id === btn.dataset.solId);
      if (sol && typeof openCatalogueModal === 'function')
        openCatalogueModal(sol, theme, () => openRoadmapLineModal(produitId, packageCode, theme));
    }));
}

// ---- USAGE ----
// buildRoadmapGantt(THEME);
</script>
