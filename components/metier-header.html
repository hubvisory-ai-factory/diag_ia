<!-- Back to dashboard -->
<button class="btn-back flex items-center gap-1.5 text-sm font-medium mb-6" style="color: var(--primary);">
  <!-- icon('arrow-left', 16, 'var(--primary)') -->
  Retour au Dashboard Global
</button>

<!-- METIER HEADER CARD -->
<section class="mb-8">
  <div class="rounded-2xl p-6 border"
       style="background: linear-gradient(135deg, var(--primary-soft), var(--bg-alt)); border-color: var(--primary-border);">
    <div class="flex items-center gap-4 mb-4">
      <!-- Large icon badge -->
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center" style="background: var(--primary-soft);">
        <!-- icon(dept.icon, 28, 'var(--primary)') -->
      </div>
      <div>
        <h2 class="font-display text-2xl" style="color: var(--ink);">Departement A</h2>
        <p class="text-sm" style="color: var(--muted);">5 personnes auditees</p>
      </div>
    </div>

    <!-- Switch to other metiers (nav pills) -->
    <div class="flex flex-wrap gap-2">
      <button class="metier-switch-btn px-3 py-1.5 rounded-full text-xs font-medium border"
              style="border-color: var(--border); color: var(--muted); background: var(--surface);"
              data-switch-to="view-metier-departement_b">
        Departement B
      </button>
      <button class="metier-switch-btn px-3 py-1.5 rounded-full text-xs font-medium border"
              style="border-color: var(--border); color: var(--muted); background: var(--surface);"
              data-switch-to="view-metier-departement_c">
        Departement C
      </button>
      <!-- One button per OTHER department -->
    </div>
  </div>
</section>
